<mat-toolbar color="primary">
    <span>KVA 2026</span>
    <span class="specer"></span>
    <a routerLink="/" matButton>
       <mat-icon fontIcon="home"/> Home
    </a>
    <a routerLink="/about" matButton>
        <mat-icon fontIcon="info"/> About
    </a>
    @if (authService.getActiveUser()) {
        <a routerLink="/user" matButton>
            <mat-icon fontIcon="account_circle"/> Account
        </a>

        <button matButton (click)="Dologout()">
            <mat-icon fontIcon="logout"/> Logout
        </button>
    }
    @else {
        <a routerLink="/login" matButton>
            <mat-icon fontIcon="login"/> Login
        </a>
    }
</mat-toolbar>
<div class="wrapper">
    <router-outlet></router-outlet>
</div>
