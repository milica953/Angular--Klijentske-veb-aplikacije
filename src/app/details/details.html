@if (flight()) {
<div class="card-wrapper">
    <mat-card>
        <mat-card-content class="content-info-card">
            <h1>Destination: {{flight()?.destination}}</h1>
            <mat-list>
                <mat-list-item>
                    <mat-icon matListItemIcon>history_2</mat-icon>
                    <div matListItemTitle>Scheduled At</div>
                    <div matListItemLine>{{utils.formatDate(flight()!.scheduledAt)}}</div>
                </mat-list-item>
                <mat-list-item>
                    <mat-icon matListItemIcon>flight</mat-icon>
                    <div matListItemTitle>Airplane Model</div>
                    <div matListItemLine>{{flight()?.plane}}</div>
                </mat-list-item>
                <mat-list-item>
                    <mat-icon matListItemIcon>bookmark</mat-icon>
                    <div matListItemTitle>Terminal</div>
                    <div matListItemLine>{{flight()?.terminal}}</div>
                    
                </mat-list-item>
            </mat-list>
        </mat-card-content>
        @if (authService.getActiveUser()) {
        <mat-card-actions>
            <a [routerLink]="`/details/${flight()?.id}/order`" matButton>
                <mat-icon fontIcon="airplane_ticket" /> book now
            </a>
            

            </mat-card-actions>
    }
    </mat-card>

    <mat-card class="content-info-image-card">
        <img [src]="utils.getImageUrl(flight()!)" />
    </mat-card>

    <mat-card class="map-card">
        <mat-card-content>
            <iframe width="100%" height="400" style="border:0" loading="lazy" allowfullscreen
                [src]="getMapUrl(flight()!.destination)">
            </iframe>
        </mat-card-content>
    </mat-card>

</div>

}
@else {
    <app-loading />
    
}
