<mat-card class="login-card">
    <mat-card-content>
        <h1>Login</h1>

        <mat-form-field>
            <mat-label>Email</mat-label>
            <input matInput type="email">
        </mat-form-field>

        <mat-form-field>
            <mat-label>Password</mat-label>
            <input matInput type="password">
        </mat-form-field>
        
        <mat-card-actions>
            <button mat-button>submit</button>
        </mat-card-actions>
    </mat-card-content>
</mat-card>
